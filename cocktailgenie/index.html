<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" lang="en" dir="ltr">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocktail Genie - 你的私人调酒助手</title>
    <link href="style/styles.css" type="text/css" rel="stylesheet">
</head>

<body>
    <header>
        <nav id="navbar">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="pages/recipes.html">鸡尾酒配方</a></li>
                <li><a href="pages/ingredients.html">基础材料</a></li>
                <li><a href="pages/about.html">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <main id="cocktail-finder">
        <h1>Cocktail Genie</h1>
        <p class="subtitle">选择你手边的材料，发现专属于你的鸡尾酒配方</p>
        
        <section id="ingredient-selector">
            <h2>选择可用材料</h2>
            <div class="ingredient-categories">
                <div class="category">
                    <h3>基酒</h3>
                    <div class="ingredients">
                        <label><input type="checkbox" name="base" value="龙舌兰"> 龙舌兰</label>
                        <label><input type="checkbox" name="base" value="白朗姆"> 白朗姆</label>
                        <label><input type="checkbox" name="base" value="伏特加"> 伏特加</label>
                        <label><input type="checkbox" name="base" value="金酒"> 金酒</label>
                    </div>
                </div>
                
                <div class="category">
                    <h3>利口酒</h3>
                    <div class="ingredients">
                        <label><input type="checkbox" name="liqueur" value="君度橙力娇酒"> 君度橙力娇酒</label>
                        <label><input type="checkbox" name="liqueur" value="咖啡利口酒"> 咖啡利口酒</label>
                        <label><input type="checkbox" name="liqueur" value="蓝橙力娇酒"> 蓝橙力娇酒</label>
                        <label><input type="checkbox" name="liqueur" value="杏仁利口酒"> 杏仁利口酒</label>
                    </div>
                </div>
                
                <div class="category">
                    <h3>辅料</h3>
                    <div class="ingredients">
                        <label><input type="checkbox" name="mixer" value="青柠汁"> 青柠汁</label>
                        <label><input type="checkbox" name="mixer" value="薄荷叶"> 薄荷叶</label>
                        <label><input type="checkbox" name="mixer" value="苏打水"> 苏打水</label>
                        <label><input type="checkbox" name="mixer" value="糖浆"> 糖浆</label>
                        <label><input type="checkbox" name="mixer" value="可乐"> 可乐</label>
                        <label><input type="checkbox" name="mixer" value="柠檬汁"> 柠檬汁</label>
                    </div>
                </div>
            </div>
            
            <button id="find-cocktails">寻找鸡尾酒</button>
        </section>

        <section id="results" class="hidden">
            <h2>可制作的鸡尾酒</h2>
            <div id="cocktail-list">
                <!-- 结果将通过 JavaScript 动态添加 -->
                <template id="cocktail-template">
                    <div class="cocktail-card">
                        <h3 class="cocktail-name"></h3>
                        <div class="cocktail-ingredients"></div>
                        <p class="cocktail-instructions"></p>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Cocktail Genie</p>
    </footer>

    <script src="scripts/cocktail.js"></script>
</body>
</html>
