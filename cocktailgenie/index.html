<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" lang="en" dir="ltr">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocktail Genie - 你的私人调酒助手</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="style/styles.css" type="text/css" rel="stylesheet">
</head>

<body>
    <header>
        <nav id="navbar">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="pages/recipes.html">鸡尾酒配方</a></li>
                <li><a href="pages/ingredients.html">基础材料</a></li>
                <li><a href="pages/about.html">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <main id="cocktail-finder">
        <h1>Cocktail Genie</h1>
        <p class="subtitle">选择你手边的材料，发现专属于你的鸡尾酒配方</p>
        
        <section id="ingredient-selector">
            <h2>选择可用材料</h2>
            <div class="ingredient-categories">
                <div id="base-spirits" class="category">
                    <h3>基酒</h3>
                    <div class="ingredients">
                        <!-- 将由JavaScript填充 -->
                    </div>
                </div>
                
                <div id="liqueurs" class="category">
                    <h3>利口酒</h3>
                    <div class="ingredients">
                        <!-- 将由JavaScript填充 -->
                    </div>
                </div>
                
                <div id="mixers" class="category">
                    <h3>辅料</h3>
                    <div class="ingredients">
                        <!-- 将由JavaScript填充 -->
                    </div>
                </div>
            </div>
            
            <button id="find-cocktails">寻找鸡尾酒</button>
        </section>

        <section id="results" class="hidden">
            <h2>可制作的鸡尾酒</h2>
            <div id="cocktail-list">
                <!-- 结果将通过 JavaScript 动态添加 -->
                <template id="cocktail-template">
                    <div class="cocktail-card">
                        <h3 class="cocktail-name"></h3>
                        <div class="cocktail-ingredients"></div>
                        <p class="cocktail-instructions"></p>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Cocktail Genie</p>
    </footer>

    <script src="scripts/cocktail.js"></script>
</body>
</html>
