    <main id="cocktail_grid">
        <!-- 鸡尾酒卡片示例 -->
        <div class="cocktail-card">
            <div class="cocktail-image">
                <img src="../images/mojito.jpg" alt="莫吉托">
            </div>
            <div class="cocktail-info">
                <h2>莫吉托 Mojito</h2>
                <h3>配料:</h3>
                <ul>
                    <li>朗姆酒 45ml</li>
                    <li>青柠汁 30ml</li>
                    <li>薄荷叶 6-8片</li>
                    <li>糖浆 15ml</li>
                    <li>苏打水</li>
                </ul>
                <h3>制作步骤:</h3>
                <ol>
                    <li>在杯中放入薄荷叶和糖浆</li>
                    <li>轻轻捣碎薄荷叶</li>
                    <li>加入青柠汁和朗姆酒</li>
                    <li>加入碎冰</li>
                    <li>最后注入苏打水</li>
                </ol>
            </div>
        </div>
        
        <!-- 可以继续添加更多鸡尾酒卡片 -->
